<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walking by Rhema - Sign In</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <h2>Walking by Rhema</h2>
    <p class="subtitle">Sign in to continue</p>

    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          name="email" 
          placeholder="Enter your email"
          required
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          name="password" 
          placeholder="Enter your password"
          required
        >
      </div>

      <!-- ✅ ERROR MESSAGE (CORRECT POSITION) -->
      <p id="error" class="error-text"></p>

      <!-- Sign In Button -->
      <button type="submit" class="btn-primary">
        Sign In
      </button>

      <!-- Google Login -->
      <button type="button" id="googleLogin" class="btn-google">
        Continue with Google
      </button>

      <!-- Links -->
      <div class="auth-links">
        <p><a href="#" id="forgotPassword">Forgot Password?</a></p>
        <p>Don't have an account? <a href="register.html">Sign Up</a></p>
      </div>

    </form>

  </div>
</div>

<!-- JS (BEST PRACTICE: ALL AT BOTTOM, NO DEFER NEEDED) -->
<script type="module" src="js/login.js"></script>
<script type="module" src="js/google.js"></script>
<script type="module" src="js/forgot.js"></script>

</body>
</html>
